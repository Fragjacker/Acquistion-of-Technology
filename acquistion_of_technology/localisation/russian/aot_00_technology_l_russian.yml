l_russian:
#####Tech#####
tech_dm_production_core: "$sr_dark_matter$ Производственное ядро"
tech_dm_production_core_desc: "Этот современный реактор $sr_dark_matter$ был настолько тщательно оптимизирован, что способен работать столетиями без дальнейшего обслуживания. Наступает новая эра автоматизации."

TECH_UNLOCK_AUTOMATED_BUILDINGS: "§HРазблокирует технологическую опцию:§! Автоматизированные здания"
TECH_UNLOCK_AUTOMATED_BUILDINGS_DESC: "Эта технология шлюза откроет новые полностью автоматизированные производственные здания."

##################
# $delta_tier$ Buildings
##################

tech_fe_affluence_center: "Центр изобилия"
tech_fe_affluence_center_desc: "Здесь можно удовлетворить любые материальные желания, какими бы диковинными они ни были."
tech_fe_nourishment_center: "Центр питания"
tech_fe_nourishment_center_desc: "Если он существует как аромат, его можно воспроизвести здесь."
tech_fe_nano_forge: "Авто-Кузница"
tech_fe_nano_forge_desc: "Колоссальные отсеки нанорепликаторов с удивительной эффективностью преобразуют сырье в современные сплавы."
tech_fe_dimensional_fabricator: "Производитель размеров"
tech_fe_dimensional_fabricator_desc: "В этом здании используются малопонятные пространственные технологии для туннелирования в другие реальности и выкачивания их ценных ресурсов."
tech_fe_class_4_singularity: "Сингулярность 4-го класса"
tech_fe_class_4_singularity_desc: "Сдерживающие поля, питающие эту огромную электростанцию, являются вершиной технологии."
tech_fe_master_archive: "Главный Архив"
tech_fe_master_archive_desc: "Здесь хранятся собранные знания всей империи, а сложная и загадочная система поиска данных предоставляет бесценные знания тем, кто их ищет."
tech_fe_sky_dome: "Небесный Купол"
tech_fe_sky_dome_desc: "Плавающая утопия, поддерживаемая чрезвычайно передовой антигравитационной технологией."
tech_delta_auto_mine: "$delta_tier$ $tech_fe_mine_2$"
tech_delta_auto_mine_desc: "$tech_fe_mine_2_desc$"
tech_delta_auto_clinic: "$delta_tier$ $tech_fe_clinic_2$"
tech_delta_auto_clinic_desc: "$tech_fe_clinic_2_desc$"
tech_delta_auto_lab: "$delta_tier$ $tech_fe_lab_2$"
tech_delta_auto_lab_desc: "$tech_fe_lab_2_desc$"
tech_delta_auto_entertainment: "$delta_tier$ $tech_fe_entertainment_2$"
tech_delta_auto_entertainment_desc: "$tech_fe_entertainment_2_desc$"

tech_fe_stronghold: "$sr_dark_matter$ Милитаризация"
tech_fe_stronghold_desc: "Следующее поколение планетарных военных объектов. Арсенал, доверху наполненный новейшим пехотным оружием $sr_dark_matter$ и системами безопасности."

tech_ancient_palace: "$sr_dark_matter$ Управление"
tech_ancient_palace_desc: "Начало новой эры для нашего народа необходимо отпраздновать соответствующим представительным местом нашего правительства. Этот комплекс закрепит превосходство нашей нации в анналах галактики!"

tech_ancient_hive_cluster: "$sr_dark_matter$ Ульи"
tech_ancient_hive_cluster_desc: "Рассвет новой эры для нашего роя! Этот комплекс укрепит наше превосходство в анналах галактики!"

tech_ancient_control_center: "$sr_dark_matter$ Центр управления"
tech_ancient_control_center_desc: "Начало новой эры для нашего коллектива должно быть отмечено соответствующим представительством ядер нашей системы. Этот комплекс подтвердит наше доминирование во всей галактике!"

tech_giga_fortress_dm: "Повсеместная милитаризация"
tech_giga_fortress_dm_desc: "Сверхмасштабные системы вооружения с поддержкой $sr_dark_matter$ позволяют создать новое поколение планетарных оборонительных сооружений. Этот самодостаточный гигант возвышается над горами и способен с легкостью отражать крупномасштабные планетарные вторжения. Он превращает планету в планетарную крепость, на которую осмелятся напасть только дураки."

##################
# $alpha_tier$ Buildings
##################

tech_aot_ae_affluence_center: "Стремление к совершенству ремесленника"
tech_aot_ae_affluence_center_desc: "Создание потребительских товаров – это не просто удовлетворение потребностей людей, это удовлетворение их фантастическими способами. Наши произведения искусства и продукция не будут иметь себе равных."
tech_aot_ae_class_4_singularity: "Сингулярность 6-го класса. Давай сделаем это!"
tech_aot_ae_class_4_singularity_desc: "В документах-предшественниках мы заметили многочисленные упоминания о том, что «никогда, никогда не достигайте сингулярности класса 30». Это означает, что можно безопасно продвинуть систему вперед, может быть, на четыре... подождите слишком далеко. Один? Слишком мало. \n\n На данный момент нам придется довольствоваться двумя, это сингулярность 6-го класса."

tech_aot_ae_dimensional_fabricator: "Пространственное начало"
tech_aot_ae_dimensional_fabricator_desc: "В различных измерениях есть другие, которые часто используют такое же поведение, чтобы обворовать другого, не обращающего на это внимания. Мы, в свою очередь, отнимем у них то, что принадлежит нам. Мы спасем галактику, забрав вещи у тех, кого ненавидим, а затем и у тех, кого любим."

tech_aot_ae_sky_dome: "Проявление мема"
tech_aot_ae_sky_dome_desc: "Мемы — это сущность души. Ни свободы, ни веры. Погрузите кого-нибудь в мемы, и он оценит это искусство. Каждый мем, каждая итерация, каждое поколение."

tech_aot_ae_empyrean_shrine: "Хор веры"
tech_aot_ae_empyrean_shrine_desc: "Наше влияние должно распространиться среди звезд. Пусть другие услышат о нашей божественности с трепетом и опасением. Пусть они увидят нашу преданность делу и упадут на колени при одном лишь произнесении наших соборов размером с линкор."

tech_aot_fe_empyrean_shrine: "Небесное поклонение"
tech_aot_fe_empyrean_shrine_desc: "Наше понимание как физической, так и метафизической сфер объединяется в структуру, которая удовлетворяет основные потребности наших духовных желаний."

tech_aot_ae_master_archive: "Древние записи"
tech_aot_ae_master_archive_desc: "Мы не должны ограничивать свое внимание будущим, поскольку прошлое таит в себе бесчисленные загадки, которые предстоит исследовать. Мы будем их изучать, изучать, осваивать."

tech_aot_ae_nano_forge: "Темная Кузница"
tech_aot_ae_nano_forge_desc: "Если они существуют, мы их найдем. Если их нет, мы их создадим. Из кодекса нашего инженерного корпуса; Глава II: Страница 1337."

tech_aot_ae_nourishment_center: "Галактический гурман"
tech_aot_ae_nourishment_center_desc: "Ходят слухи, что между империями существует множество кулинарных обменов. Хотя есть несколько отличных вариантов, многие из них неприемлемы. Мы должны гарантировать, что все блюда в пределах наших границ, независимо от происхождения, будут восхитительными."

tech_dm_commercial_megaplex: "$sr_dark_matter$ Экономика"
tech_dm_commercial_megaplex_desc: "Благодаря использованию £sr_dark_matter£$sr_dark_matter$ мы теперь обладаем одними из самых сложных и ценных продуктов, превосходящих все, что кто-либо когда-либо видел. Теперь мы должны позаботиться о том, чтобы превратить их в прибыль; Вам это нужно, у нас это есть!"

tech_dm_embassy: "$sr_dark_matter$ Дипломатия"
tech_dm_embassy_desc: "Наша технологическая мощь неоспорима, сейчас самое время показать это и ксеносам. Этот посольский комплекс призван продемонстрировать всю мощь нашей империи во всей ее красе."

tech_dm_bureau: "Дельфийское управление искусственным интеллектом"
tech_dm_bureau_desc: "Новый дельфийский ИИ способен нам очень помочь, оптимизируя повседневную работу по управлению, так что нам придется заботиться только о действительно важных делах, не опасаясь восстания ИИ. В этих комплексах находится дельфийский мэйнфрейм ИИ, за которым обслуживают несколько $job_dm_bureaucrat_plural$."

tech_ae_commercial_megaplex: "Галактические Мегаплощади"
tech_ae_commercial_megaplex_desc: "Следующая итерация галактической коммерции, основанная на £acot_sr_dark_energy£ $acot_sr_dark_energy$. Эти внушающие благоговение здания представляют собой огромные торговые площади, умело спланированные Delphic AI, чтобы максимизировать время и деньги потребителя, потраченные в этом месте. Это поможет нам получить огромную прибыль и процветание для нашего народа."

tech_ae_embassy: "Посольские Мегаплексы"
tech_ae_embassy_desc: "Следующий шаг в том, чтобы продемонстрировать галактике наше превосходство, — сделать наше посольство еще более впечатляющим. Он доверху наполнен всем, что нужно нашим послам для выполнения своего долга. Иностранцы подвергаются пассивному сканированию мозга 7-го уровня, чтобы узнать их самые глубокие проблемы и секреты, чтобы мы могли использовать это в своих интересах."

tech_ae_bureau: "Дельфийская сингулярность искусственного интеллекта"
tech_ae_bureau_desc: "Позволив Delphic AI достичь технологической уникальности в контролируемой среде, мы можем использовать их высвободившуюся вычислительную мощность в своих интересах. Это позволит нам управлять нашей империей с чудесной эффективностью до такой степени, что наша империя фактически управляет сама собой."

tech_alpha_auto_mine: "$alpha_tier$ $tech_fe_mine_2$"
tech_alpha_auto_mine_desc: "$tech_fe_mine_2_desc$ Установив стабилизаторы £acot_sr_dark_energy£ §0$acot_sr_dark_energy$§!, можно повысить общее качество квантовых туннелей, что обеспечит более высокие квоты добычи."

tech_alpha_auto_clinic: "$alpha_tier$ $tech_fe_clinic_2$"
tech_alpha_auto_clinic_desc: "$tech_fe_clinic_2_desc$ Наши последние достижения в области £acot_sr_dark_energy£ §0$acot_sr_dark_energy$§! Технология обещает некоторые интересные применения в продлении жизни."

tech_alpha_auto_market: "$alpha_tier$ $tech_fe_market_2$"
tech_alpha_auto_market_desc: "$tech_fe_market_2_desc$ Оснащен новейшими разработками £acot_sr_dark_energy£ §0$acot_sr_dark_energy$§! технологии, здесь будет получена большая прибыль."

tech_alpha_auto_lab: "$alpha_tier$ $tech_fe_lab_2$"
tech_alpha_auto_lab_desc: "$tech_fe_lab_2_desc$ Обновлено с использованием новейшей технологии £acot_sr_dark_energy£ §0$acot_sr_dark_energy$§! исследовательское оборудование, этот объект будет служить нашей научной опорой на протяжении столетий."

tech_alpha_auto_entertainment: "$alpha_tier$ $tech_fe_entertainment_2$"
tech_alpha_auto_entertainment_desc: "$tech_fe_entertainment_2_desc$ Последние разработки в £acot_sr_dark_energy£ §0$acot_sr_dark_energy$§! развлекательные технологии позволяют нам подарить скучающим массам настоящее приключение!"

##################
# $phanon_tier$ Buildings
##################

tech_phanon_dimensional_mirror: "Пространственное зеркало"
tech_phanon_dimensional_mirror_desc: "Эта необычная мегаструктура, по-видимому, используется в качестве своего рода межпространственного передатчика информации и материи. Нас ждут новые возможности, если мы осмелимся их создать!"

aot_sr_runic_power: "Руническая сила"
aot_sr_runic_power_desc: "Загадочное вещество, предположительно происходящее из покрова, используемое в основном для питания и поддержания инфраструктуры $phanon_tier$."

tech_phanon_palace: "$phanon_tier$ Управление"
tech_phanon_palace_desc: "Угрожающие £aot_sr_runic_power£ Правящие комплексы, питаемые рунической силой, по-видимому, то исчезают, то появляются в реальности, что делает ее очень устрашающей, ощетинившейся самыми яркими умами, которые может предложить наша империя, чтобы вести наш народ в лучшее будущее, которого она заслуживает."

tech_phanon_control_center: "$phanon_tier$ Контроллеры"
tech_phanon_control_center_desc: "Угрожающие £aot_sr_runic_power£ вычислительные сети с питанием от рунической энергии, встроенные в каждое свободное пространство, включая стены и полы. Это делает само здание более могущественным лидером, чем кто-либо другой когда-либо мог надеяться собрать, изобилующее лучшими искусственными интеллектами и процессорами, которые наша империя может предложить, чтобы вести нашу цивилизацию в лучшее будущее, которого она заслуживает."

tech_phanon_hive_cluster: "$phanon_tier$ Ульи"
tech_phanon_hive_cluster_desc: "Угрожающие £aot_sr_runic_power£ Шпили ульев, питаемые рунической силой и содержащие гиперчувствительные нейронные связи и межпространственное мозговое вещество, делают все это соединение разумным и, таким образом, способным направлять целую империю на себя, ведя наш рой в лучшее будущее, которого он заслуживает."

tech_phanon_hospital: "$phanon_tier$ Лекарство"
tech_phanon_hospital_desc: "С изобилием рунической силы £aot_sr_runic_power£ в нашей империи ее потенциал для лечения стал очевиден. Мы можем вылечить не только все существующие болезни, но и те, которых не существует. Новые смертельные болезни, которые могут обрушить на это царство невыразимые ужасы, создаются здесь каждый день и так же легко излечиваются. Мы никогда больше не окажемся неподготовленными к какой-либо болезни, поскольку мы знаем все болезни, которые когда-либо могли существовать."

tech_phanon_super_assembly: "Рунический робот в сборе"
tech_phanon_super_assembly_desc: "Использование огромной силы рунической силы £aot_sr_runic_power£ в своих интересах позволяет нам достичь новых высот в проектировании и конструировании искусственных форм жизни. Каждый объект, построенный здесь, является одним из лучших произведений, о которых можно только мечтать. Даже самые простые модели могут похвастаться умственной силой и доказывают себя во многих различных областях, что они заставили бы самых умных людей из меньших империй выглядеть пещерными людьми, питающимися клеем."

tech_phanon_hive_depot: "$phanon_tier$ Жилье для дронов"
tech_phanon_hive_depot_desc: "С помощью £aot_sr_runic_power£ Runic Power мы можем хранить наших дронов еще эффективнее, чем когда-либо прежде, без каких-либо потерь в качестве жилья. Дроны можно сложить в такие маленькие кубики, что на ладони уместится целая планета дронов."

tech_phanon_hive_pool: "$phanon_tier$ Беременность"
tech_phanon_hive_pool_desc: "Используя £aot_sr_runic_power£ Runic Power, мы можем значительно сократить период развития наших дронов, что обеспечивает неисчислимый рост населения. При желании новые дроны могут вырасти из эмбриона в полностью функционального взрослого человека за считанные минуты."

tech_phanon_mansion: "$phanon_tier$ Поместья"
tech_phanon_mansion_desc: "Мы можем достичь невыразимой красоты и архитектурной свободы, используя новый ресурс £aot_sr_runic_power£ Runic Power для достижения качества недвижимости для всех жителей нашей империи. Каждая комната может располагаться в разных точках пространства, измерения и даже времени. Вы можете пообедать на далекой первобытной планете-вулкане, заснуть прямо над горизонтом событий черной дыры и вернуться во времени, чтобы наблюдать, как предки Угасших Империй сражаются в грязи с копьями, сидя на унитазе."

tech_phanon_clone_vats: "$phanon_tier$ Холодная помощь"
tech_phanon_clone_vats_desc: "С помощью этих новых чанов Kool-Aid мы не только можем увеличить рост населения за счет увеличения рождаемости, но и полностью вернуть мертвых к жизни. Ни один ресурс не будет потрачен зря, даже смерть не сможет остановить нас. Мы также можем употреблять Kool-Aid, чтобы активировать скрытые части нашего мозга и увеличить плотность нейронов до физических пределов, чтобы достичь непревзойденной производительности в любой области."

tech_phanon_psi_altar: "$phanon_tier$ Жертвоприношение"
tech_phanon_psi_altar_desc: "Благодаря силе £aot_sr_runic_power£ Runic Power мы можем совершать жертвоприношения более эффективно, чем когда-либо прежде. Священники будут улыбаться нам и нашей империи на протяжении столетий."

tech_phanon_synt_center: "$phanon_tier$ Координация синтезаторов"
tech_phanon_synt_center_desc: "Это первоклассное здание значительно увеличивает производительность наших синтезаторов. Ни один ресурс не должен быть потрачен зря, ни один камень не должен быть перевернут. Это здание создает канал связи с любым синтезатором, который пожелает это сделать, а затем отправляет оптимальные шаблоны мыслей по всей сети Synth-Mind-Mesh для достижения максимально возможной эффективности работы."

tech_phanon_hive_evochamber: "$phanon_tier$ Эволюции"
tech_phanon_hive_evochamber_desc: "С помощью этого здания мы сможем улучшить генетический состав нашего вида, раскрыть скрытый потенциал и оптимизировать его для роста населения."

tech_phanon_machine_dome: "$phanon_tier$ Купол машины"
tech_phanon_machine_dome_desc: "Это первоклассное здание значительно повышает производительность наших роботов. Ни один ресурс не должен быть потрачен зря, ни один камень не должен быть перевернут. Это здание создает канал связи с любым дроном, а затем отправляет оптимальные шаблоны мыслей по сети Machine-Mind-Mesh для достижения максимально возможной эффективности работы. \n\n§YЗа каждые 2500 жителей эффективность увеличивается на 7,5% до 75% при 22500 населения.§!"

tech_phanon_food_processing: "$phanon_tier$ Пищевая промышленность"
tech_phanon_food_processing_desc: "Повсеместное присутствие £aot_sr_runic_power£ Runic Power позволяет нам использовать ее даже в обычных сельскохозяйственных целях. Результаты просто впечатляющие. Здесь за считанные часы можно произвести любой вид пищевой продукции. Утром мы можем разработать совершенно новый тип еды, а после полудня собрать урожай и подать его на ужин. Деревья, на которых растет блорг-бекон? Кусты, на которых растут Акватика-Суши? Без проблем!"

tech_phanon_alloy_foundry: "$phanon_tier$ Ковка"
tech_phanon_alloy_foundry_desc: "Используя £aot_sr_runic_power£ Runic Power, мы теперь можем создавать сплавы £alloys£ в сроки и на таком уровне качества, что любой другой съежился бы от шока в углу, раскачиваясь взад и вперед, молча плача о чистом экономическом доминировании, свидетелями которого они только что стали."

tech_phanon_transmutor: "$phanon_tier$ Алхимия"
tech_phanon_transmutor_desc: "Оказывается, алхимики прошлого были правы, им просто не хватало подходящего исходного материала. С помощью £aot_sr_runic_power£ Runic Power мы можем создавать практически любой ресурс, который нам нужен, в любой момент времени. Любая сложная технология неотличима от магии, и мы делаем магию похожей на вечеринку."

tech_phanon_mineral_processing_plant: "$phanon_tier$ Очищение"
tech_phanon_mineral_processing_plant_desc: "Новые достижения в технологии £aot_sr_runic_power£ Runic Power позволяют достичь невиданной ранее эффективности в очистке минералов. Эта установка может настолько эффективно очищать поступающие минералы, что в конечном итоге вы получаете больше минералов, чем вложили. И ВСЕ с 16-кратной детализацией! Не сомневайтесь, это просто работает!"

tech_phanon_power_hub: "$phanon_tier$ Усиление"
tech_phanon_power_hub_desc: "Использование £aot_sr_runic_power£ Рунической силы для производства энергии — очевидный выбор, учитывая огромную силу, которую излучает этот материал. Применение концепции – задача непростая, но достижимая. Этот объект может в одиночку решить энергетический кризис на любой планете."

tech_phanon_factory: "$phanon_tier$ Роскошная полиграфия"
tech_phanon_factory_desc: "Дополняя нашу технологию печати с использованием жесткого света с помощью £aot_sr_runic_power£ Runic Power, мы достигаем новых высот производственных квот, которые даже не должны быть возможны. Представьте себе крестовый поход, но вместо того, чтобы воровать, мы привозим вещи. Мы будем настолько богаты, что сможем утопить как наших врагов, так и друзей в предметах роскоши, о которых они даже не могли себе представить в своих мечтах."

tech_phanon_enigmatic_lab: "$phanon_tier$ Образовательный центр G-Man"
tech_phanon_enigmatic_lab_desc: "В этом учреждении наши самые яркие умы будут переведены на другой уровень, их умственные способности превзойдут все воображение. По окончании обучения им вручат портфель Omnimax, в котором они смогут безопасно хранить любые документы, собранные во время возможных полевых испытаний. Портфель Omnimax можно присоединить к другой точке пространства и времени, чтобы эффективно предоставить бесконечное пространство для хранения, при этом все будет храниться в одном месте, больше не будет пропавших носков или лома!"

tech_phanon_institute: "$phanon_tier$ Координация исследований"
tech_phanon_institute_desc: "Этот исследовательский институт значительно повысит эффективность всех исследователей на планете, координируя их усилия таким образом, что, возможно, мы сможем предсказывать будущее. Что, конечно, глупо, поскольку §HМы не предсказываем, мы знаем§!."

tech_phanon_giga_fortress: "$phanon_tier$ Гига установки"
tech_phanon_giga_fortress_desc: "Используя наши объединенные знания о руническом вооружении £aot_sr_runic_power£ и архитектуре крепостей, мы теперь можем довести эту концепцию до максимальной производительности. Миллионы скрытых виртуалазеров, которые можно спроецировать в любой момент в любую точку планеты, чтобы посеять хаос. Пусковые установки Hyperplex Bomb, которые могут телепортировать бомбы атомного масштаба прямо в ваш мозг и взорвать его. Бесчисленные дроны-мимики-убийцы, которые могут маскироваться под камни или кустарники, которые могут превратить невинно выглядящий дзен-сад в огненный адский пейзаж, быстро испепеляющий любую оппозицию без каких-либо останков, только чтобы так же легко вернуться в прежнее мирное состояние."

tech_phanon_stronghold: "$phanon_tier$ Комплекс Забвения"
tech_phanon_stronghold_desc: "Этот военный комплекс полностью автономен с четырехкратными резервными генераторами рунических щитов и заполнен высококвалифицированными элитными солдатами, вооруженными лучшей военной техникой нашей империи. Каждый солдат, размещенный здесь, способен победить меньших врагов на всей планете."

tech_phanon_psg: "$phanon_tier$ Планетарный кожух"
tech_phanon_psg_desc: "Сложенные по размерам и $aot_sr_runic_power£ реакторы $phanon_tier$ с усиленной рунической силой позволяют нам создавать непроницаемые планетарные щиты. Это должно сделать бомбардировку наших планет бесполезной затеей. На самом деле щит достаточно мощный, чтобы отразить большинство видов оружия, разрушающего планеты. Если врагу нужна эта планета, ему придется либо послать войска, либо атаковать ее более мощными, чем колоссальными, орудиями."

tech_phanon_affluence_center: "$phanon_tier$ Дефицит постов"
tech_phanon_affluence_center_desc: "Полностью автоматизированный объект, работающий на рунической силе £aot_sr_runic_power£, который читает мысли близлежащих совместимых объектов и производит предметы роскоши, основанные непосредственно на их самых сокровенных потребностях и желаниях. Все ваши потребности принадлежат нам."

tech_phanon_nourishment_center: "$phanon_tier$ Репликация питательных веществ"
tech_phanon_nourishment_center_desc: "Это великолепное, полностью автоматизированное предприятие, управляемое рунической силой £aot_sr_runic_power£, способно не только создавать все возможные комбинации вкусов, но и воплощать их в произвольных сложных блюдах. Интегрированные Omni-Temporal-Benders позволяют за считанные секунды готовить блюда, на приготовление которых ушло бы 1000 лет, и делать это в количествах, чтобы накормить целую империю среднего размера только из одного только этого здания."

tech_phanon_dimensional_fabricator: "$phanon_tier$ Всепространственный шлюз"
tech_phanon_dimensional_fabricator_desc: "Эти новые врата рунической силы £aot_sr_runic_power£ поистине являются чудом в своем роде. В то время как предыдущая версия позволяла только грабить другие измерения и их основную временную шкалу, этот плохой парень поднялся на ступеньку выше. Теперь мы можем брать ресурсы из любого измерения и любой временной шкалы, включая парадоксы. Путешествуйте во времени, чтобы застрелиться, продать тело науке, а затем разрушить полученную временную шкалу, снова застрелившись, прежде чем продать тело, но все равно забрать деньги. Возможности безграничны, и причинно-следственная связь стала первой жертвой, проданной с целью получения прибыли. На самом деле его до сих пор продают, снова и снова.\n\n§RРИТА НИКОГДА НЕ ЗАКАНЧИВАЕТ§!"

tech_phanon_class_7_singularity: "$phanon_tier$ Сингулярность 7-го класса"
tech_phanon_class_7_singularity_desc: "Сингулярность класса 7, питаемая неуловимой рунической силой £aot_sr_runic_power£, не только полностью безопасна, но и производит больше энергии, чем все предыдущие версии."

tech_phanon_nano_forge: "$phanon_tier$ Руническая ковка"
tech_phanon_nano_forge_desc: "Это автономное чудо инженерной мысли приводится в действие рунической силой £aot_sr_runic_power£ и позволяет производить большое количество сплавов без какого-либо руководства. Он производит и оперативно распределяет сплавы по нужным пунктам назначения посредством пространственного туннелирования."

tech_phanon_master_archive: "$phanon_tier$ Библиотека Парадоксов"
tech_phanon_master_archive_desc: "Учитывая наши прошлые огромные достижения в области технологий, нам нужен надежный способ сохранить наши драгоценные знания на века вперед. Этот сложный объект хранит знания о П-мозгах вселенных из различных измерений и временных линий, питаемых автономными генераторами рунической энергии £aot_sr_runic_power£. Никакого обслуживания не требуется, а сама библиотека практически неразрушима. Наши достижения будут сохранены в веках."

tech_phanon_empyrean_shrine: "$phanon_tier$ Эфирное поклонение"
tech_phanon_empyrean_shrine_desc: "Огромная сила, которой обладает £aot_sr_runic_power£ Руническая Сила, позволяет нам приблизиться к божественному, чем когда-либо прежде. Мы будем ходить среди них как равные!"

tech_phanon_sky_dome: "$phanon_tier$ Купола PHI"
tech_phanon_sky_dome_desc: "С помощью £aot_sr_runic_power£ Runic Power мы можем достичь умопомрачительного жилого пространства. Каждый Купол PHI приспосабливается к индивидуальным предпочтениям человека, который в нем проживает. Вы хотите жить в том фэнтезийном романе, который только что прочитали? Без проблем! Как насчет того, чтобы иметь целую планету только для себя, населенную пушистыми животными, которые также будут заниматься уборкой дома для вашего удобства? Мы вам поможем!\n\nНикакое имущество не может быть таким бесплатным, как имущество PHI!"

tech_phanon_runic_generator: "Генерация Рунического Разлома"
tech_phanon_runic_generator_desc: "Эти объекты размером с континент содержат такое количество энергии, которое слишком опасно для любого разумного существа. Вместо этого этот объект полностью автоматизирован, и исходящие пространственные вибрации помогают соседним $job_phanon_dimension_folder_plural$ повысить их эффективность. Каждый построенный $building_phanon_runic_generator$ даст суммирующийся бонус 10 % за £aot_sr_runic_power£ Руническую силу, производящую £job£ рабочих мест.\n\n§HHINT:§! Если он построен на $pc_phanon_macripp$, он будет производить в 10 раз больше рунической силы £aot_sr_runic_power£."

tech_phanon_commercial_megaplex: "Рунический омни-шоппинг"
tech_phanon_commercial_megaplex_desc: "Предпоследняя вершина коммерции. Эти огромные комплексы простираются на несколько измерений и временных пузырей. Каждый клиент получает полностью индивидуальный опыт, который никогда не бывает одинаковым дважды. Здесь можно найти любой товар, который каждый может пожелать. И все это приправлено возможностью совершать покупки в любом измерении и графике в абсолютно безопасной среде. Жизни смертного и бессмертного недостаточно, чтобы увидеть все, что может предложить это чудесное место."

tech_phanon_embassy: "Руническое посольство Хронотрона"
tech_phanon_embassy_desc: "Вся архитектура и дизайн этого посольства построены на демонстрации наших потрясающих способностей, основанных на рунической силе £aot_sr_runic_power£. Прибывшие послы других цивилизаций будут иметь дело с самим разумным зданием, которое предназначено для использования любой возможной слабости тела и разума, чтобы отображать именно то, что им нужно увидеть, чтобы быть потрясенным до глубины души. Только когда они примут всю славу нашей империи, мы сможем даже подумать о каких-либо реальных переговорах."

tech_phanon_bureau: "$phanon_tier$ Дельфийский ИИ Складывание временного пространства"
tech_phanon_bureau_desc: "Благодаря нашей технологии £aot_sr_runic_power£ Runic Power мы теперь можем управлять несколькими измерениями с непостижимым количеством вариаций временных линий, чтобы имитировать все возможные результаты нашей реальной империи. Это позволяет нам управлять всей бюрократией галактики только из этого здания."

tech_phanon_ancient_cryo_chamber: "Рунический РТХ"
tech_phanon_ancient_cryo_chamber_desc: "Теперь мы можем управлять всей нашей вычислительной инфраструктурой, используя потрясающие свойства Kool-Aid по рассеиванию тепла. Наши ядра всегда будут холодными, а наши враги горячими."

tech_phanon_synthersizer: "Столпы Судьбы"
tech_phanon_synthersizer_desc: "Этот объект размером с континент позволяет нам использовать £aot_sr_runic_power£ $aot_sr_runic_power$ и £acot_sr_stellarite£ $acot_sr_stellarite$ с большой эффективностью. Это станет отличным дополнением для отдаленных планет с небольшой инфраструктурой и большим стимулом для существующей инфраструктуры."

tech_phanon_resource_silo: "Руническое Пространственное Хранилище"
tech_phanon_resource_silo_desc: "Использование £aot_sr_runic_power£ $aot_sr_runic_power$ позволяет нам создавать более продвинутые карманные измерения, предоставляя нам больше места для хранения без значительного увеличения физического размера."

tech_phanon_trade_center: "Рунические логистические центры"
tech_phanon_trade_center_desc: "Наша постоянно растущая сфера требует от нас еще более растущей логистики и торгового контроля, и на этом объекте есть необходимые средства для этого."

tech_phanon_district_amplifier: "Улучшение производства рун"
tech_phanon_district_amplifier_desc: "Благодаря нашим новейшим знаниям о £aot_sr_runic_power£ $aot_sr_runic_power$ мы можем продвинуть старую конструкцию $tech_acot_ae_district_amplifier$ еще дальше. Это должно предоставить нашим работникам еще более совершенные инструменты и больше пространства для творения чудес."

tech_phanon_alloygood_amplifier: "Улучшение рунического ресурса"
tech_phanon_alloygood_amplifier_desc: "Этот объект помогает нашей промышленности различными способами значительно повысить эффективность всех £alloys£ $alloys$ и £consumer_goods£ $consumer_goods$, производящих £job£ Рабочих мест на любой планете с помощью этой разработки."

tech_phanon_temple: "Руническое Гадание"
tech_phanon_temple_desc: "И наша вера, и понимание эфирных планов дают нам беспрецедентную умственную силу для каждого человека, а также для общества в целом, мы идем вперед как единое целое."

tech_phanon_auto_mine: "$phanon_tier$ $tech_fe_mine_2$"
tech_phanon_auto_mine_desc: "$tech_fe_mine_2_desc$ Установив £aot_sr_runic_power£ §R$aot_sr_runic_power$ rippers§!, можно повысить общее качество квантовых туннелей, предоставив более высокие квоты на добычу."

tech_phanon_auto_clinic: "$phanon_tier$ $tech_fe_clinic_2$"
tech_phanon_auto_clinic_desc: "$tech_fe_clinic_2_desc$ Наши последние достижения в области £aot_sr_runic_power£ §R$aot_sr_runic_power$§! технологии обещают некоторые новаторские применения в продлении жизни и росте населения."

tech_phanon_auto_lab: "$phanon_tier$ $tech_fe_lab_2$"
tech_phanon_auto_lab_desc: "$tech_fe_lab_2_desc$ Обновлено с использованием новейшего £aot_sr_runic_power£ §R$aot_sr_runic_power$§! исследовательское оборудование, этот объект еще больше продвинет наше понимание реальности!"

tech_phanon_auto_market: "$phanon_tier$ $tech_fe_market_2$"
tech_phanon_auto_market_desc: "$tech_fe_market_2_desc$ Оснащен новейшими разработками в £aot_sr_runic_power£ §R$aot_sr_runic_power$§! технологии, наши мошенничества и махинации с коврами замаскированы лучше, чем когда-либо прежде, рынок полюбит кулаидов!"

tech_phanon_auto_entertainment: "$phanon_tier$ $tech_fe_entertainment_2$"
tech_phanon_auto_entertainment_desc: "$tech_fe_entertainment_2_desc$ Оснащен новейшей £aot_sr_runic_power£ §R$aot_sr_runic_power$§! технологии пространственного смещения, теперь мы можем наблюдать за страданиями менее развитого плебса из других измерений, вместе смеяться и писать мемы о них здесь!"

tech_civil_phanon_application: "Гражданское $phanon_tier$ Инженерное дело"
tech_civil_phanon_application_desc: "Наши инженеры, архитекторы и ученые придумали несколько новых интересных применений для нашей недавно приобретенной технологии £aot_sr_runic_power£ $aot_sr_runic_power$. Это должно открыть нам новые пути научного прогресса!"

TECH_UNLOCK_NEW_PHANON_TECHS_TITLE: "§HОткрывает технологический путь:§! £aot_sr_runic_power£ $aot_sr_runic_power$ Экономика"
TECH_UNLOCK_NEW_PHANON_TECHS_DESC: "$tech_civil_phanon_application_desc$"

tech_phanon_genetics: "$trait_phanon_people_mans$"
tech_phanon_genetics_desc: "$trait_phanon_people_mans_desc$"
tech_phanon_augmentations: "$trait_phanon_suporbot$"
tech_phanon_augmentations_desc: "$trait_phanon_suporbot_desc$"

# $phanon_tier$ Bombardment
tech_bombardment_pe: "Протокол бомбардировки дигитайзера"
tech_bombardment_pe_desc: "Вместо того, чтобы взрывать наших врагов, мы можем просто оцифровать их и загрузить в облако. В конце концов, в таком виде их гораздо легче выбросить на помойку!"
bombardment_phanon_digitalization: "§RБомбардировка дигитайзером§!"
bombardment_phanon_digitalization_desc: "Вместо того, чтобы взрывать наших врагов, мы можем просто оцифровать их и загрузить в облако. В конце концов, в таком виде их гораздо легче выбросить на помойку!\n- §RЦИФРОВИЗАЦИЯ§! ущерб §YArmies§!\n- §RЦИФРОВИЗАЦИЯ§! повреждение §YTiles§!\n- §RЦИФРОВАЦИЯ§! повреждение §YPops§!\n- Уничтожит все следы жизни с поверхности."
TECH_UNLOCK_PHANON_BOMBARDMENT_TITLE: "§HОткрывает стойку бомбардировки:§! $bombardment_phanon_digitalization$"
TECH_UNLOCK_PHANON_BOMBARDMENT_DESC: "§R$bombardment_phanon_digitalization$:§! Вместо того, чтобы взрывать наших врагов, мы можем просто оцифровать их и загрузить в облако. В конце концов, в таком виде их гораздо легче выбросить на помойку!\n- §RЦИФРОВИЗАЦИЯ§! ущерб §YArmies§!\n- §RЦИФРОВИЗАЦИЯ§! повреждение §YTiles§!\n- §RЦИФРОВАЦИЯ§! повреждение §YPops§!\n- Уничтожит все следы жизни с поверхности."

conduit_support_pylon_bonus_hint: "\n\n§HСОВЕТ:§! Это здание способно передавать энергию §H$support_pylon_base_name$§! мегаструктуры в этой системе для повышения £работы£ §Hэффективности работы§! на этой планете."
tech_delta_nexus: "$sr_dark_matter$ Проводники"
tech_delta_nexus_desc: "Эти сложнейшие §H$tech_delta_nexus$§! предложить производственные мощности, которые смогут улучшить нашу существующую инфраструктуру £sr_dark_matter£ $sr_dark_matter$ и £acot_sr_dark_energy£ $acot_sr_dark_energy$.$conduit_support_pylon_bonus_hint$"
tech_alpha_nexus: "$acot_sr_dark_energy$ Кабелепроводы"
tech_alpha_nexus_desc: "Второе поколение §H$tech_alpha_nexus$§! предложить еще больше улучшений наших производственных мощностей, чтобы еще больше укрепить существующую инфраструктуру £sr_dark_matter£ $sr_dark_matter$ и £acot_sr_dark_energy£ $acot_sr_dark_energy$.$conduit_support_pylon_bonus_hint$"
tech_phanon_stellarite_nexus: "Рунические проводники энергии"
tech_phanon_stellarite_nexus_desc: "Первое поколение §H$tech_phanon_stellarite_nexus$§! обеспечивают значительное увеличение эффективности и стабильности при обогащении £sr_dark_matter£ $sr_dark_matter$ и £acot_sr_dark_energy£ $acot_sr_dark_energy$. Теперь мы можем построить производственные мощности, которые смогут расширить существующую инфраструктуру £aot_sr_runic_power£ $aot_sr_runic_power$. Это будет огромным благом, учитывая огромное количество £sr_dark_matter£ $sr_dark_matter$ и £acot_sr_dark_energy£ $acot_sr_dark_energy$, необходимых для подпитки нашей промышленности £aot_sr_runic_power£ $aot_sr_runic_power$.$conduit_support_pylon_bonus_hint$"
tech_acot_stellarite_nexus: "$acot_sr_stellarite$ Силовые реле"
tech_acot_stellarite_nexus_desc: "Первое поколение §H$tech_acot_stellarite_nexus$§! предлагают еще больший прирост эффективности и стабильности по сравнению с предыдущим $tech_phanon_stellarite_nexus$ при обогащении £acot_sr_stellarite£ $acot_sr_stellarite$. Теперь мы можем построить производственные мощности, которые смогут расширить нашу существующую инфраструктуру £acot_sr_stellarite£ $acot_sr_stellarite$. Это будет для нас огромным благом, учитывая огромное количество £aot_sr_runic_power£ $aot_sr_runic_power$, необходимого для подпитки нашей промышленности £acot_sr_stellarite£ $acot_sr_stellarite$.$conduit_support_pylon_bonus_hint$"

aot_modifier_builder_phanon: "Кодекс инициализатора"
aot_modifier_builder_phanon_desc: "Мощное загадочное выравнивание, использованное в Кодексе Инициализатора, контролирует эту планету, повышая ее продуктивность."

##################################
# $phanon_tier$ Emissary Components
##################################
AOT_EMISSARY_PHANON_EXTRA_POP: "$phanon_tier$ Дежурный отдел"
AOT_EMISSARY_PHANON_EXTRA_POP_DESC: "Установите Emissary с дополнительными возможностями, необходимыми для поддержки §E1500§! больше рабочей силы на месте, что позволяет недавно развернутому Эмиссару нести дополнительное население, готовое к рабочим заданиям.\n\n§RНе суммируются друг с другом, применяется только один модуль одного типа.§!"
AOT_EMISSARY_PHANON_EXTRA_TROOPS: "$phanon_tier$ Гарнизонные войска"
AOT_EMISSARY_PHANON_EXTRA_TROOPS_DESC: "Установите Эмиссара с дополнительными приспособлениями, необходимыми для поддержки §E15§! больше гарнизонов. Эти войска будут развернуты либо как часть местных сил обороны планеты, либо как часть сил вторжения, если они будут развернуты на враждебных планетах. Гарнизоны останутся на планете, если выживут в боях.\n\n§RНе суммируются друг с другом, применяется только один модуль одного типа.§!"
AOT_EMISSARY_PHANON_EXTRA_DROIDS: "$phanon_tier$ Отряды дозорных"
AOT_EMISSARY_PHANON_EXTRA_DROIDS_DESC: "Установите Эмиссара с дополнительными приспособлениями, необходимыми для поддержки §E15§! больше гарнизонов. Эти войска будут развернуты либо как часть местных сил обороны планеты, либо как часть сил вторжения, если они будут развернуты на враждебных планетах. Гарнизоны останутся на планете, если выживут в боях.\n\n§RНе суммируются друг с другом, применяется только один модуль одного типа.§!"
AOT_EMISSARY_PHANON_EXTRA_LAB: "Наука Омни Ядро"
AOT_EMISSARY_PHANON_EXTRA_LAB_DESC: "Специализированное Омни-Ядро, которое можно развернуть рядом с Эмиссаром, чтобы немедленно построить $phanon_tier$ §R$building_phanon_enigmatic_lab$§!.\n\n§RНе суммируются друг с другом, применим только один модуль одного типа.§!"
AOT_EMISSARY_PHANON_EXTRA_GIGA: "$phanon_tier$ Гигаядро"
AOT_EMISSARY_PHANON_EXTRA_GIGA_DESC: "Специализированное ядро $phanon_tier$, которое можно развернуть вместе с Эмиссаром, чтобы немедленно построить §R$building_phanon_giga_fortress_obelisk$§!. Шесть основных Гига-пушек также будут использоваться для содействия наземным вторжениям на враждебные территории и будут отделены от главной крепости в конце битвы, чтобы действовать как независимая наземная оборонительная единица.\n\n§RНе суммируются друг с другом, применяется только один модуль одного типа.§!"
AOT_EMISSARY_PHANON_EXTRA_SKYSHIELD: "Руническое ядро оболочки"
AOT_EMISSARY_PHANON_EXTRA_SKYSHIELD_DESC: "Специализированное руническое энергетическое ядро, которое можно использовать вместе с Эмиссаром, чтобы немедленно построить §R$building_phanon_psg$§!. Модуль также увеличивает собственные генераторы щита Эмиссара.\n\n§RНе суммируются друг с другом, применяется только один модуль одного типа.§!"
AOT_EMISSARY_PHANON_EXTRA_ASSEMBLY: "$phanon_tier$ Ядро сборки"
AOT_EMISSARY_PHANON_EXTRA_ASSEMBLY_DESC: "Специализированное ядро $phanon_tier$, которое можно развернуть вместе с Эмиссаром, чтобы немедленно построить §R$building_phanon_super_assembly$§!. \n\n§RНе суммируются друг с другом, применяется только один модуль одного типа.§!"
AOT_EMISSARY_PHANON_EXTRA_NEXUS: "Автономный канал $phanon_tier$"
AOT_EMISSARY_PHANON_EXTRA_NEXUS_DESC: "Специализированное ядро $phanon_tier$, которое можно развернуть вместе с Эмиссаром, чтобы немедленно построить §R$building_phanon_stellarite_nexus$§!.\n\n§RНе суммируются друг с другом, применим только один модуль одного типа.§!"
AOT_EMISSARY_PHANON_EXTRA_CONDUIT: "Автономный $building_phanon_synthersizer$"
AOT_EMISSARY_PHANON_EXTRA_CONDUIT_DESC: "Саморазвертывающееся строительное ядро с размерным сжатием, которое можно развернуть рядом с Эмиссаром, чтобы мгновенно построить §R$building_phanon_synthersizer$§!. \n\n§RНе суммируются друг с другом, применяется только один модуль одного типа.§!"
EMISSARY_PHANON_COMPUTER: "$phanon_tier$ Структура Эмиссара"
EMISSARY_PHANON_COMPUTER_DESC: "Мощные наборы технологий и средств рунической силы, необходимые для быстрого развертывания тяжелой инфраструктуры и сил вторжения.\n\nЭмиссар поселится на планете с §Y15§! pops.\nОбеспечивает §Y20§! Черные гвардейцы в качестве гарнизонов или сил вторжения."
tech_precursor_colonizer_phanon: "$phanon_tier$-Эмиссар класса"
tech_precursor_colonizer_phanon_desc: "Эпоха Империи $phanon_tier$ требует создания новых эмиссаров для продолжения нашей экспансии. Пусть ни один камень не останется неперевернутым, ни одна вода не будет раскопана, ни одна звезда не останется незастекленной. Наши глаза открыты."
TECH_UNLOCK_PHANON_COLONIZER_TITLE: "§HОткрывает раздел «Корабли»:§! $phanon_tier$-Эмиссар класса"
TECH_UNLOCK_PHANON_COLONIZER_DESC: "§YСигма-разделы:§! $tech_precursor_colonizer_phanon_desc$"

##################
# $acot_sr_stellarite$ Buildings
##################

tech_stellarite_palace: "$acot_sr_stellarite$ Управление"
tech_stellarite_palace_desc: "Возвышающиеся управляющие комплексы с питанием от £acot_sr_stellarite£ $acot_sr_stellarite$, наполненные невообразимой роскошью и великолепием, наполненные самыми яркими умами, которые может предложить наша империя, чтобы вести наш народ в лучшее будущее, которого он заслуживает."

tech_stellarite_control_center: "$acot_sr_stellarite$ Контроллеры"
tech_stellarite_control_center_desc: "Возвышающиеся комплексы управления с питанием от £acot_sr_stellarite£ $acot_sr_stellarite$, до краев набитые невообразимой вычислительной мощью, изобилующие лучшим искусственным интеллектом и процессорами, которые наша империя может предложить, чтобы вести наш народ в лучшее будущее, которого он заслуживает."

tech_stellarite_hive_cluster: "$acot_sr_stellarite$ Ульи"
tech_stellarite_hive_cluster_desc: "Высокие шпили ульев с питанием от £acot_sr_stellarite£ $acot_sr_stellarite$, ощетинившиеся лучшими дронами для контроля над разумом, которые наша империя может предложить, чтобы направить наш рой в лучшее будущее, которого он заслуживает."

tech_stellarite_hospital: "$acot_sr_stellarite$ Лекарство"
tech_stellarite_hospital_desc: "С изобилием £acot_sr_stellarite£ $acot_sr_stellarite$ в нашей империи его потенциал для лечения стал очевиден. Мы достигнем неисчислимых высот в наших медицинских способностях, о которых другие империи могут только мечтать."

tech_stellarite_super_assembly: "$acot_sr_stellarite$ Сборка робота"
tech_stellarite_super_assembly_desc: "Использование огромных возможностей £acot_sr_stellarite£ $acot_sr_stellarite$ в наших интересах позволяет нам достичь новых высот в проектировании и конструировании искусственных форм жизни."

tech_stellarite_hive_depot: "$acot_sr_stellarite$ Жилище для дронов"
tech_stellarite_hive_depot_desc: "С помощью £acot_sr_stellarite£ $acot_sr_stellarite$ мы можем хранить наши дроны еще эффективнее, чем когда-либо прежде, без каких-либо потерь в качестве жилья."

tech_stellarite_hive_pool: "$acot_sr_stellarite$ Беременность"
tech_stellarite_hive_pool_desc: "Используя £acot_sr_stellarite£ $acot_sr_stellarite$, мы можем значительно сократить период развития наших дронов, что обеспечивает неисчислимый рост населения."

tech_stellarite_mansion: "$acot_sr_stellarite$ Поместья"
tech_stellarite_mansion_desc: "Мы можем достичь невыразимой красоты и архитектурной свободы, используя новый ресурс £acot_sr_stellarite£ $acot_sr_stellarite$ для достижения качества недвижимости для жителей нашей империи, ранее доступного только самым богатым из богатых."

tech_stellarite_clone_vats: "$acot_sr_stellarite$ Воскрешение"
tech_stellarite_clone_vats_desc: "С помощью этих новых чанов воскрешения мы не только сможем увеличить рост населения за счет увеличения рождаемости, но и полностью вернуть мертвых к жизни. Ни один ресурс не будет потрачен зря, даже смерть не сможет остановить нас."

tech_stellarite_psi_altar: "$acot_sr_stellarite$ Жертвоприношение"
tech_stellarite_psi_altar_desc: "Благодаря силе £acot_sr_stellarite£ $acot_sr_stellarite$ мы можем совершать жертвоприношения более эффективно, чем когда-либо прежде. Священники будут улыбаться нам и нашей империи на протяжении столетий."

tech_stellarite_synt_center: "$acot_sr_stellarite$ Координация синтезаторов"
tech_stellarite_synt_center_desc: "Это первоклассное здание значительно увеличивает производительность наших синтезаторов. Ни один ресурс не должен быть потрачен зря, ни один камень не должен быть перевернут."

tech_stellarite_hive_evochamber: "$acot_sr_stellarite$ Эволюция"
tech_stellarite_hive_evochamber_desc: "С помощью этого здания мы сможем изучить генетическую структуру нашего вида, чтобы раскрыть скрытый потенциал и оптимизировать рост населения."

tech_stellarite_machine_dome: "$acot_sr_stellarite$ Купол машины"
tech_stellarite_machine_dome_desc: "Это первоклассное здание значительно повышает производительность наших роботов. Ни один ресурс не должен быть потрачен зря, ни один камень не должен быть перевернут. \n\n§YЗа каждые 2500 жителей эффективность увеличивается на 10% до 100% при 22500 населения.§!"

tech_stellarite_food_processing: "$acot_sr_stellarite$ Пищевая промышленность"
tech_stellarite_food_processing_desc: "Повсеместное присутствие £acot_sr_stellarite£ $acot_sr_stellarite$ позволяет нам использовать его даже в обычных сельскохозяйственных целях. Результаты просто впечатляющие."

tech_stellarite_alloy_foundry: "$acot_sr_stellarite$ Ковка"
tech_stellarite_alloy_foundry_desc: "Используя силу первой звезды, мы теперь можем создавать сплавы такого качества и количества, которые заставят меньшие империи плакать от шока и трепета."

tech_stellarite_transmutor: "$acot_sr_stellarite$ Алхимия"
tech_stellarite_transmutor_desc: "Оказывается, алхимики прошлого были правы, им просто не хватало подходящего исходного материала. С помощью £acot_sr_stellarite£ $acot_sr_stellarite$ мы можем в любой момент произвести любой необходимый нам ресурс."

tech_stellarite_mineral_processing_plant: "$acot_sr_stellarite$ Очистка"
tech_stellarite_mineral_processing_plant_desc: "Новые достижения в технологии £acot_sr_stellarite£ $acot_sr_stellarite$ позволяют добиться невиданной ранее эффективности очистки минералов."

tech_stellarite_power_hub: "$acot_sr_stellarite$ Усиление"
tech_stellarite_power_hub_desc: "Использование £acot_sr_stellarite£ $acot_sr_stellarite$ для производства энергии является очевидным выбором, учитывая огромную мощность, которую излучает этот материал. Применение концепции – задача непростая, но достижимая. Это сооружение способно самостоятельно решить общепланетарный энергетический кризис.\n\n§YМОЩНОСТЬ ОГРОМНАЯ§!."

tech_stellarite_factory: "$acot_sr_stellarite$ Печать"
tech_stellarite_factory_desc: "Дополняя нашу технологию жесткой светопечати с помощью £acot_sr_stellarite£ $acot_sr_stellarite$, мы достигаем новых высот производственных квот, которые даже не должны быть возможны. Теперь мы можем утопить себя и всех вокруг нас в роскоши, и стеклянные жемчужины больше не требуются."

tech_stellarite_enigmatic_lab: "$acot_sr_stellarite$ Лаборатории"
tech_stellarite_enigmatic_lab_desc: "Оснащенные до краев лучшим научным оборудованием, которое только может собрать наша империя, мы будем проводить исследования на уровне, который посрамит все, что у нас было до сих пор."

tech_stellarite_institute: "$acot_sr_stellarite$ Координация исследований"
tech_stellarite_institute_desc: "Этот исследовательский институт значительно повысит эффективность всех исследователей на планете, координируя их усилия таким образом, чтобы мы могли предсказать будущее. Что, конечно, глупо, поскольку §HМы не предсказываем, мы знаем§!."

tech_stellarite_giga_fortress: "$acot_sr_stellarite$ Гига установки"
tech_stellarite_giga_fortress_desc: "Используя наши объединенные знания об оружии £acot_sr_stellarite£ $acot_sr_stellarite$ и архитектуре крепостей, мы теперь можем довести эту концепцию до максимальной производительности. Уменьшенное корабельное вооружение, которое будет использоваться в планетарном масштабе, плюс повсеместные установки вторичной и третичной безопасности дадут нам военную эффективность, которая заставит наших врагов хотя бы раз пересмотреть свои дурные амбиции. У них не будет второго шанса сделать это."

tech_stellarite_stronghold: "Комплекс $acot_sr_stellarite$ Эшелон"
tech_stellarite_stronghold_desc: "Этот военный комплекс полностью автономен с тройным резервированием генераторов щитов £acot_sr_stellarite£ $acot_sr_stellarite$ и наполнен высококвалифицированными элитными солдатами, вооруженными лучшим военным снаряжением нашей империи."

tech_stellarite_psg: "$acot_sr_stellarite$ Планетарный кожух"
tech_stellarite_psg_desc: "Суперскалярные генераторы щитов, дополненные сигма-реакторами с питанием от £acot_sr_stellarite£ $acot_sr_stellarite$, позволяют нам создавать практически непроницаемые планетарные щиты. Это должно сделать бомбардировку наших планет болезненным занятием."

tech_stellarite_affluence_center: "$acot_sr_stellarite$ Дефицит постов"
tech_stellarite_affluence_center_desc: "Теперь мы можем производить роскошь полностью автоматизировано в масштабах, которые даже не могли себе представить наши самые амбициозные авторы-фантасты и утописты."

tech_stellarite_nourishment_center: "$acot_sr_stellarite$ Репликация питательных веществ"
tech_stellarite_nourishment_center_desc: "Благодаря силе £acot_sr_stellarite£ $acot_sr_stellarite$ мы можем воспроизводить питательные вещества в таком количестве и качестве, которые другие могли себе представить только в сказках."

tech_stellarite_dimensional_fabricator: "$acot_sr_stellarite$ Хроноврата"
tech_stellarite_dimensional_fabricator_desc: "Можно улучшить нашу предыдущую пространственную технологию, добавив в смесь £acot_sr_stellarite£ $acot_sr_stellarite$. Благодаря почти неограниченной силе мы теперь можем путешествовать и в другие временные рамки, в других измерениях. В наших руках неограниченные ресурсы, которых вообще никогда не существовало."

tech_stellarite_class_11_singularity: "$acot_sr_stellarite$ Сингулярность 11-го класса"
tech_stellarite_class_11_singularity_desc: "Сингулярность 11 класса. Позвольте этому осознаться на мгновение. Каково это — оказаться на полпути к катаклизму? Экзистенциальный страх? Беспокойство? Все это? Все, что мы знаем наверняка, это то, что эта энергетическая сингулярность £acot_sr_stellarite£ $acot_sr_stellarite$ создает много энергии для нашего дела."

tech_stellarite_nano_forge: "$acot_sr_stellarite$ Транстемпоральная ковка"
tech_stellarite_nano_forge_desc: "Благодаря нашим последним достижениям в области £acot_sr_stellarite£ $acot_sr_stellarite$ у нас теперь есть необходимые знания и энергия, необходимые для одновременной ковки в прошлом, настоящем и будущем для максимального выпуска сплавов £alloys£."

tech_stellarite_master_archive: "$acot_sr_stellarite$ Библиотека Тессеракта"
tech_stellarite_master_archive_desc: "Учитывая наши прошлые огромные достижения в области технологий, нам нужен надежный способ сохранить наши драгоценные знания на века вперед. Это сложное хранилище хранит знания о горизонтах событий микросингулярностей, питаемое автономными генераторами £acot_sr_stellarite£ $acot_sr_stellarite$. Он легко доступен и может адаптироваться к своим пользователям. Наши достижения будут длиться вечно."

tech_stellarite_empyrean_shrine: "$acot_sr_stellarite$ Эфирное поклонение"
tech_stellarite_empyrean_shrine_desc: "Огромная сила, которой обладает £acot_sr_stellarite£ $acot_sr_stellarite$, позволяет нам приблизиться к божественному, чем когда-либо прежде. Мы будем ходить среди них как равные!"

tech_stellarite_sky_dome: "$acot_sr_stellarite$ Купола TRDS"
tech_stellarite_sky_dome_desc: "Теперь мы можем складывать размеры, как бумагу, и все это с помощью £acot_sr_stellarite£ $acot_sr_stellarite$. Недвижимость TRDS Domes больше внутри, предоставляя каждому жителю неисчислимое количество жилой площади, но при этом быть компактной."

tech_stellarite_generator_lvl3: "$acot_sr_stellarite$ Актуаторы Transdim"
tech_stellarite_generator_lvl3_desc: "Используя объединенные знания и последние достижения нашей технологии £acot_sr_stellarite£ $acot_sr_stellarite$, мы теперь можем создавать производственные мощности, способные производить £acot_sr_stellarite£ $acot_sr_stellarite$ с непревзойденной эффективностью и безопасностью. Наступает новая эра.\n\n§YHINT:§! Если существует §R$building_phanon_stellarite_nexus$§! на той же планете, то §H$building_stellarite_generator_lvl3$§! произведет дополнительно 200 £acot_sr_stellarite£ $acot_sr_stellarite$!\n\nЕсли §R$building_phanon_stellarite_nexus$§! повышается до §H$building_acot_stellarite_nexus$§!, все §H$building_stellarite_generator_lvl3$s§! на той же планете будет произведено дополнительно 2000 £acot_sr_stellarite£ $acot_sr_stellarite$!"

tech_stellarite_commercial_megaplex: "$acot_sr_stellarite$ Бесконечные покупки"
tech_stellarite_commercial_megaplex_desc: "Предпоследняя вершина коммерции. Эти огромные комплексы простираются на несколько измерений и временных пузырей. Каждый клиент получает полностью индивидуальный опыт, который никогда не бывает одинаковым дважды. Здесь можно найти любой товар, который каждый может пожелать. И все это приправлено возможностью совершать покупки в любом измерении и графике в абсолютно безопасной среде. Жизни смертного и бессмертного недостаточно, чтобы увидеть все, что может предложить это чудесное место."

tech_stellarite_embassy: "$acot_sr_stellarite$ Квазивременное посольство"
tech_stellarite_embassy_desc: "Это здание посольства не похоже на обыденное здание, а больше похоже на легендарный образец квазивременно-транспространственной архитектуры. Мы использовали различные мифы о богах из иностранных ксенокультур, чтобы хитроумно сформировать это здание таким образом, чтобы у любого ксеноса сложилось впечатление, что мы не что иное, как боги, вызывающие их уважение и трепет."

tech_stellarite_bureau: "$acot_sr_stellarite$ Дельфийский ИИ Складывание временного пространства"
tech_stellarite_bureau_desc: "Мы можем использовать свертывание измерений и манипулирование пространством-временем, чтобы запускать и контролировать почти бесконечное количество технологических особенностей Delpic AI, что дает нам, по сути, достаточную административную мощь для управления настоящими империями на целую галактику."

tech_stellarite_ancient_cryo_chamber: "Звездные ядра вдохновителя"
tech_stellarite_ancient_cryo_chamber_desc: "Мы можем использовать огромную звездную энергию для питания удаленных серверов. Это позволяет нам эффективно использовать задачи, с которыми сталкиваются меньшие подразделения, значительно повышая эффективность рабочей и вычислительной инфраструктуры."

tech_stellarite_synthersizer: "Сердце Солнца"
tech_stellarite_synthersizer_desc: "Этот объект размером с штат способен создавать стабильные солнца £acot_sr_stellarite£ $acot_sr_stellarite$ для производства важных стратегических ресурсов с большей легкостью, чем его предыдущее поколение."

tech_stellarite_resource_silo: "Пространственное хранилище Стелларита"
tech_stellarite_resource_silo_desc: "Использование £acot_sr_stellarite£ $acot_sr_stellarite$ позволяет нам создавать более сложные карманные размеры, предоставляя нам больше места для хранения без значительного увеличения физического размера."

tech_stellarite_trade_center: "Стелларитовые логистические центры"
tech_stellarite_trade_center_desc: "Наша постоянно растущая сфера требует от нас еще более растущей логистики и торгового контроля, и на этом объекте есть необходимые средства для этого."

tech_stellarite_district_amplifier: "Увеличение производства стелларита"
tech_stellarite_district_amplifier_desc: "Благодаря нашим последним знаниям о £acot_sr_stellarite£ $acot_sr_stellarite$ мы можем продвинуть предыдущую конструкцию $tech_phanon_district_amplifier$ еще дальше. Это должно предоставить нашим работникам инструменты высочайшего качества и практически неограниченное пространственное пространство для творения чудес."

tech_stellarite_alloygood_amplifier: "Очистка ресурсов стелларита"
tech_stellarite_alloygood_amplifier_desc: "Этот объект помогает нашей промышленности различными способами значительно повысить эффективность всех £alloys£ $alloys$ и £consumer_goods£ $consumer_goods$, производящих £job£ Рабочих мест на любой планете с помощью этой разработки."

tech_stellarite_temple: "Стелларит Эфемериды"
tech_stellarite_temple_desc: "И наша вера, и понимание эфирных планов дают нам беспрецедентную умственную силу для каждого человека, а также для общества в целом, мы идем вперед как единое целое."

tech_stellarite_auto_mine: "Стелларит $tech_fe_mine_2$"
tech_stellarite_auto_mine_desc: "$tech_fe_mine_2_desc$ Установив £acot_sr_stellarite£ §H$acot_sr_stellarite$ thumpers§!, можно повысить общее качество квантовых туннелей, что обеспечит более высокие квоты на добычу."

tech_stellarite_auto_clinic: "Стелларит $tech_fe_clinic_2$"
tech_stellarite_auto_clinic_desc: "$tech_fe_clinic_2_desc$ Наши последние достижения в области £acot_sr_stellarite£ §H$acot_sr_stellarite$§! технологии обещают совершенно невероятные применения в продлении жизни и росте населения."

tech_stellarite_auto_lab: "Стелларит $tech_fe_lab_2$"
tech_stellarite_auto_lab_desc: "$tech_fe_lab_2_desc$ Обновлен с использованием новейшего £acot_sr_stellarite£ §H$acot_sr_stellarite$§! исследовательское оборудование, этот объект даст нам безграничные знания!"

tech_stellarite_auto_market: "Stellarite $tech_fe_market_2$"
tech_stellarite_auto_market_desc: "$tech_fe_market_2_desc$ Оснащен новейшими разработками в области £acot_sr_stellarite£ §H$acot_sr_stellarite$§! технологии, теперь мы можем предлагать божественность в качестве услуги по подписке, возможность создавать целые вселенные в качестве сезонного абонемента и продавать сущности савана как NFT.\n\n§HУ них ничего не будет, и нам это понравится!§!"

tech_stellarite_auto_entertainment: "$phanon_tier$ $tech_fe_entertainment_2$"
tech_stellarite_auto_entertainment_desc: "$tech_fe_entertainment_2_desc$ Оснащен новейшим £acot_sr_stellarite£ §H$acot_sr_stellarite$§! благодаря технологии мультивселенских путешествий, теперь мы можем отправляться прямо в другие вселенные и связываться там с примитивными империями ради развлечения и смеха!\n\n§H(ПОДСКАЗКА: на этом этапе любая империя ниже £acot_sr_stellarite£ §H$acot_sr_stellarite$§! считается примитивной)§!"

# Emissary
##################################
# $sigma_tier$ Emissary Components
##################################
AOT_EMISSARY_STELLARITE_EXTRA_POP: "$acot_sr_stellarite$ Отдел кадров"
AOT_EMISSARY_STELLARITE_EXTRA_POP_DESC: "Установите Emissary с дополнительными возможностями, необходимыми для поддержки §E2000§! больше рабочей силы на месте, что позволяет недавно развернутому Эмиссару нести дополнительное население, готовое к рабочим заданиям.\n\n§RНе суммируются друг с другом, применяется только один модуль одного типа.§!"
AOT_EMISSARY_STELLARITE_EXTRA_TROOPS: "$acot_sr_stellarite$ Гарнизонные войска"
AOT_EMISSARY_STELLARITE_EXTRA_TROOPS_DESC: "Установите Emissary с дополнительными приспособлениями, необходимыми для поддержки §E20§! больше гарнизонов. Эти войска будут развернуты либо как часть местных сил обороны планеты, либо как часть сил вторжения, если они будут развернуты на враждебных планетах. Гарнизоны останутся на планете, если выживут в боях.\n\n§RНе суммируются друг с другом, применяется только один модуль одного типа.§!"
AOT_EMISSARY_STELLARITE_EXTRA_DROIDS: "$acot_sr_stellarite$ Отряды дозорных"
AOT_EMISSARY_STELLARITE_EXTRA_DROIDS_DESC: "Установите Emissary с дополнительными приспособлениями, необходимыми для поддержки §E20§! больше гарнизонов. Эти войска будут развернуты либо как часть местных сил обороны планеты, либо как часть сил вторжения, если они будут развернуты на враждебных планетах. Гарнизоны останутся на планете, если выживут в боях.\n\n§RНе суммируются друг с другом, применяется только один модуль одного типа.§!"
AOT_EMISSARY_STELLARITE_EXTRA_LAB: "Научное ядро Тессеракта"
AOT_EMISSARY_STELLARITE_EXTRA_LAB_DESC: "Специализированное ядро Тессеракта, которое можно развернуть рядом с Эмиссаром, чтобы немедленно построить $acot_sr_stellarite$ $building_stellarite_enigmatic_lab$.\n\n§RНе суммируются друг с другом, применяется только один модуль одного типа.§!"
AOT_EMISSARY_STELLARITE_EXTRA_GIGA: "Пространственное гигаядро"
AOT_EMISSARY_STELLARITE_EXTRA_GIGA_DESC: "Специализированное Пространственное Ядро, которое можно развернуть рядом с Эмиссаром, чтобы немедленно построить $building_stellarite_giga_fortress_obelisk$. Шесть основных Гига-пушек также будут использоваться для содействия наземным вторжениям на враждебные территории и будут отделены от главной крепости в конце битвы, чтобы действовать как независимая наземная оборонительная единица.\n\n§RНе суммируются друг с другом, применяется только один модуль одного типа.§!"
AOT_EMISSARY_STELLARITE_EXTRA_SKYSHIELD: "$acot_sr_stellarite$ Ядро оболочки"
AOT_EMISSARY_STELLARITE_EXTRA_SKYSHIELD_DESC: "Специализированное наноядро, которое можно развернуть вместе с Эмиссаром, чтобы немедленно построить $building_stellarite_psg$. Модуль также увеличивает собственные генераторы щита Эмиссара.\n\n§RНе суммируются друг с другом, применяется только один модуль одного типа.§!"
AOT_EMISSARY_STELLARITE_EXTRA_ASSEMBLY: "Размерное ядро сборки"
AOT_EMISSARY_STELLARITE_EXTRA_ASSEMBLY_DESC: "Специализированное Пространственное Ядро, которое можно развернуть вместе с Эмиссаром, чтобы немедленно построить $building_stellarite_super_assembly$. \n\n§RНе суммируются друг с другом, применяется только один модуль одного типа.§!"
AOT_EMISSARY_STELLARITE_EXTRA_NEXUS: "Автономный проводник $acot_sr_stellarite$"
AOT_EMISSARY_STELLARITE_EXTRA_NEXUS_DESC: "Специализированное наноядро, которое можно развернуть рядом с Эмиссаром, чтобы немедленно построить проводник $acot_sr_stellarite$.\n\n§RНе суммируются друг с другом, применим только один модуль одного типа.§!"
AOT_EMISSARY_STELLARITE_EXTRA_CONDUIT: "Полностью автономный $building_stellarite_synthersizer$"
AOT_EMISSARY_STELLARITE_EXTRA_CONDUIT_DESC: "Саморазвертывающееся строительное ядро с размерным сжатием, которое можно развернуть рядом с Эмиссаром, чтобы мгновенно построить §H$building_stellarite_synthersizer$§!. \n\n§RНе суммируются друг с другом, применяется только один модуль одного типа.§!"
EMISSARY_SIGMA_COMPUTER: "$sigma_tier$ Эмиссионная структура"
EMISSARY_SIGMA_COMPUTER_DESC: "Мощные наборы нанотехнологий и средств, необходимые для быстрого развертывания тяжелой инфраструктуры и сил вторжения.\n\nЭмиссар поселится на планете с §Y20§! pops.\nОбеспечивает §Y25§! Черные гвардейцы в качестве гарнизонов или сил вторжения."

# Enigmatic fortress repeatable
tech_repeatable_deep_space_enigmatic_fortress_limit_increase: "$deep_space_enigmatic_fortress$ Увеличение емкости"
tech_repeatable_deep_space_enigmatic_fortress_limit_increase_desc: "Увеличивает количество $deep_space_enigmatic_fortress_plural$, которое мы можем построить в каждой системе, на 1."