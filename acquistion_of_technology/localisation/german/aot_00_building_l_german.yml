building_stellarite_institute_super_tt: "Das $building_stellarite_institute_super$ erhöht nicht nur die Effizienz von $job_stellarite_researcher_plural$, sondern bietet auch §H200%§! Auch ihre wissenschaftliche Leistung konnte gesteigert werden, ohne dass sich der Unterhalt erhöhte. Darüber hinaus erhöht die Präsenz dieses Gebäudes den gesamten $job_stellarite_researcher_plural$ Output im gesamten Imperium um §H100%§!."

