giga_prefix_text: "\n§HGiga-Orbitalabwehr:§! Dieses Gebäude versorgt den Planeten mit einer Orbitalverteidigungswaffe. Sie feuern automatisch auf feindliche Flotten, die versuchen, den Planeten zu bombardieren. Giga Fortresses wird ein einzelnes feindliches Schiff mit einer tödlichen Waffe lahmlegen"
giga_postifx_text: "alle §Y30§! Tage."
