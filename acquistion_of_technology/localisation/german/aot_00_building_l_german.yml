# Stronghold Tooltips
stronghold_prefix_text: "\n§HOrbitale Verteidigung:§! Dieses Gebäude versorgt den Planeten mit orbitalen Verteidigungsnetzwerken. Sie feuern automatisch auf feindliche Flotten, die versuchen, den Planeten zu bombardieren. Jede"
stronghold_postfix_text: "zu §Y5§! zufällige feindliche Schiffe, pro bombardierender Flotte alle §Y5§! Tage.\n\n§RDie Orbitalabwehr wird nicht mehr funktionieren, wenn die Zerstörung des Planeten 75 % übersteigt!§!"
phanon_stronghold_damage_numbers: "wird §Y4000-8000§! behandeln! Schaden"
stellarite_stronghold_damage_numbers: "wird §Y8000-16000§! behandeln! Schaden"
building_phanon_stronghold_tooltip: "$stronghold_prefix_text$ §H$building_phanon_stronghold$§! $phanon_stronghold_damage_numbers$ $stronghold_postfix_text$"
building_stellarite_stronghold_tooltip: "$stronghold_prefix_text$ §H$building_stellarite_stronghold$§! $stellarite_stronghold_damage_numbers$ $stronghold_postfix_text$"

